[pytest]
# HealthTech Solutions — Configuración pytest
# Usa settings de test (SQLite) para no requerir Oracle en CI
DJANGO_SETTINGS_MODULE = config.settings.test

# Patrones de discovery
python_files  = test_*.py
python_classes = Test
python_functions = test_

# Paths de tests
testpaths = apps

# Marcadores personalizados
markers =
    unit:       Tests unitarios (sin BD)
    integration: Tests de integración (con BD)
    hipaa:      Tests de cumplimiento HIPAA

# Cobertura (activar con: pytest --cov)
addopts =
    --strict-markers
    -v
    --tb=short
