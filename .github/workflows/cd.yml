name: HealthTech CD — Deploy a Staging / Producción

# =============================================================
# Solo en merge a main (tags de release) o push a main
# =============================================================
on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'   # v1.2.3
  workflow_dispatch:
    inputs:
      environment:
        description: 'Entorno de destino'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

# =============================================================
# Jobs
# =============================================================
jobs:

  # -----------------------------------------------------------
  # Verificar que CI pasó antes de desplegar
  # -----------------------------------------------------------
  verify-ci:
    name: Verificar CI
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verificar estado del CI
        run: echo "CI verificado. Procediendo con deploy..."

  # -----------------------------------------------------------
  # JOB: Build de imagen Docker Backend
  # -----------------------------------------------------------
  build-backend:
    name: Build Backend Docker Image
    runs-on: ubuntu-latest
    needs: verify-ci
    environment: ${{ github.event.inputs.environment || 'staging' }}

    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login a GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Metadata de imagen
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/backend
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-

      - name: Build y Push imagen backend
        uses: docker/build-push-action@v6
        with:
          context: backend
          file: backend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            DJANGO_ENV=production

  # -----------------------------------------------------------
  # JOB: Build de imagen Docker Frontend
  # -----------------------------------------------------------
  build-frontend:
    name: Build Frontend Docker Image
    runs-on: ubuntu-latest
    needs: verify-ci
    environment: ${{ github.event.inputs.environment || 'staging' }}

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login a GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build y Push imagen frontend
        uses: docker/build-push-action@v6
        with:
          context: frontend
          file: frontend/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository }}/frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VITE_API_BASE_URL=${{ vars.API_BASE_URL }}

  # -----------------------------------------------------------
  # JOB: Migraciones Oracle (en servidor de staging/prod)
  # -----------------------------------------------------------
  run-migrations:
    name: Ejecutar Migraciones
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend]
    environment: ${{ github.event.inputs.environment || 'staging' }}

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Ejecutar migraciones via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            cd /opt/healthtech
            docker-compose pull backend
            docker-compose run --rm backend python manage.py migrate --no-input
            echo "Migraciones aplicadas exitosamente"

  # -----------------------------------------------------------
  # JOB: Deploy final con docker-compose
  # -----------------------------------------------------------
  deploy:
    name: Deploy ${{ github.event.inputs.environment || 'staging' }}
    runs-on: ubuntu-latest
    needs: run-migrations
    environment: ${{ github.event.inputs.environment || 'staging' }}

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            cd /opt/healthtech

            # Pull imágenes nuevas
            docker-compose pull

            # Restart con zero-downtime (rolling update)
            docker-compose up -d --no-deps --scale backend=2 backend
            sleep 15
            docker-compose up -d --no-deps backend
            docker-compose up -d --no-deps frontend nginx

            # Limpieza de imágenes antiguas
            docker image prune -f

            echo "=== Deploy completado: $(date) ==="
            docker-compose ps

      - name: Verificar salud de la aplicación
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            # Health check del API
            curl -sf https://api.healthtech.gt/api/v1/health/ \
              && echo "API: OK" \
              || echo "WARN: Health check falló (puede ser normal en primeros 30s)"

  # -----------------------------------------------------------
  # JOB: Notificación de resultado
  # -----------------------------------------------------------
  notify:
    name: Notificación de Deploy
    runs-on: ubuntu-latest
    needs: deploy
    if: always()

    steps:
      - name: Notificar resultado
        run: |
          STATUS="${{ needs.deploy.result }}"
          VERSION="${{ github.ref_name }}"
          echo "Deploy ${VERSION} — Status: ${STATUS}"
          # Aquí se podría integrar Slack/Teams/SNS según HIPAA incident response
