name: HealthTech CI — Lint + Test + Build

# =============================================================
# Triggers
# =============================================================
on:
  push:
    branches: [main, develop, 'feature/**', 'hotfix/**']
  pull_request:
    branches: [main, develop]

# =============================================================
# Variables de entorno globales
# =============================================================
env:
  PYTHON_VERSION: '3.12'
  NODE_VERSION: '20'
  DJANGO_SETTINGS_MODULE: config.settings.test

# =============================================================
# Jobs
# =============================================================
jobs:

  # -----------------------------------------------------------
  # JOB 1: Backend — Lint (flake8 + black + isort)
  # -----------------------------------------------------------
  backend-lint:
    name: Backend Lint
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: backend/requirements/dev.txt

      - name: Instalar dependencias de desarrollo
        run: pip install -r requirements/dev.txt

      - name: Lint con flake8
        run: |
          flake8 apps/ config/ \
            --max-line-length=120 \
            --exclude=migrations,__pycache__ \
            --ignore=E501,W503

      - name: Verificar formato con black
        run: |
          black --check --diff apps/ config/ \
            --exclude "(migrations|__pycache__)"

      - name: Verificar orden de imports con isort
        run: |
          isort --check-only --diff apps/ config/ \
            --skip migrations \
            --profile black

  # -----------------------------------------------------------
  # JOB 2: Backend — Tests (pytest con SQLite en memoria)
  # -----------------------------------------------------------
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    needs: backend-lint

    defaults:
      run:
        working-directory: backend

    # Variables para test settings (sin Oracle real)
    env:
      DJANGO_SETTINGS_MODULE: config.settings.test
      DJANGO_SECRET_KEY: ci-test-secret-key-not-for-production-2026
      VPD_ENABLED: 'false'
      TDE_ENABLED: 'false'
      AWS_ACCESS_KEY_ID: 'test-key'
      AWS_SECRET_ACCESS_KEY: 'test-secret'
      AWS_PACS_BUCKET: 'healthtech-test'
      AWS_REGION: 'us-east-1'
      ORACLE_ENV: 'test'

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: backend/requirements/dev.txt

      - name: Instalar dependencias
        run: pip install -r requirements/dev.txt

      - name: Crear directorio de logs
        run: mkdir -p logs

      - name: Ejecutar tests con cobertura
        run: |
          pytest \
            --cov=apps \
            --cov-report=xml \
            --cov-report=term-missing \
            --cov-fail-under=70 \
            -v \
            --tb=short \
            -m "not integration"

      - name: Subir reporte de cobertura
        uses: codecov/codecov-action@v4
        if: always()
        with:
          file: backend/coverage.xml
          flags: backend
          name: healthtech-backend

  # -----------------------------------------------------------
  # JOB 3: Frontend — Lint + TypeScript check + Build
  # -----------------------------------------------------------
  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Instalar dependencias npm
        run: npm ci

      - name: Lint con ESLint
        run: npm run lint

      - name: Verificar tipos con TypeScript
        run: npx tsc --noEmit

      - name: Build de producción
        run: npm run build
        env:
          VITE_API_BASE_URL: 'https://api.healthtech.gt'

      - name: Verificar tamaño del bundle
        run: |
          echo "=== Bundle size ==="
          du -sh dist/
          ls -lh dist/assets/*.js | sort -k5 -rh | head -10

  # -----------------------------------------------------------
  # JOB 4: Seguridad — Dependencias vulnerables
  # -----------------------------------------------------------
  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Instalar pip-audit
        run: pip install pip-audit

      - name: Auditoría de dependencias Python (HIPAA CVE check)
        run: |
          pip install -r backend/requirements/base.txt
          pip-audit \
            --requirement backend/requirements/base.txt \
            --ignore-vuln PYSEC-2024-47 \
            || true   # No bloquear CI en vulnerabilidades conocidas sin fix

      - name: Auditoría de dependencias npm
        working-directory: frontend
        run: |
          npm ci
          npm audit --audit-level=high || true

  # -----------------------------------------------------------
  # JOB 5: Django checks — Migrations + System check
  # -----------------------------------------------------------
  django-checks:
    name: Django System Checks
    runs-on: ubuntu-latest
    needs: backend-lint

    defaults:
      run:
        working-directory: backend

    env:
      DJANGO_SETTINGS_MODULE: config.settings.test
      DJANGO_SECRET_KEY: ci-test-secret-key-not-for-production-2026
      VPD_ENABLED: 'false'
      TDE_ENABLED: 'false'
      AWS_ACCESS_KEY_ID: 'test-key'
      AWS_SECRET_ACCESS_KEY: 'test-secret'
      AWS_PACS_BUCKET: 'healthtech-test'
      AWS_REGION: 'us-east-1'
      ORACLE_ENV: 'test'

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: backend/requirements/dev.txt

      - name: Instalar dependencias
        run: pip install -r requirements/dev.txt

      - name: Crear directorio de logs
        run: mkdir -p logs

      - name: Django system check
        run: python manage.py check --deploy 2>&1 | grep -v "WARNINGS" || true

      - name: Verificar migraciones pendientes
        run: |
          python manage.py migrate --run-syncdb 2>&1 || true
          python manage.py showmigrations 2>&1 | grep '\[ \]' && \
            echo "ERROR: Hay migraciones sin aplicar" && exit 1 || \
            echo "OK: Todas las migraciones aplicadas"
